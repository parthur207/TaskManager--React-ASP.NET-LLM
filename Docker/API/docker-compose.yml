name: TaskManager

services:

  # ─── SQL Server ────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: TaskManager_SqlServer
    environment:
      SA_PASSWORD: "TaskManager@2024"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P TaskManager@2024 -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      # O contexto é a raiz do repositório (dois níveis acima do Dockerfile)
      context: ../..
      dockerfile: Docker/API/Dockerfile
    container_name: TaskManager_API
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;
        Database=TaskManagerDb;
        User Id=sa;
        Password=TaskManager@2024;
        TrustServerCertificate=True;
      Jwt__Key: "7Fj9Kp2Lm8Qx4Vz1Nc6Rb3Hy5Tw7Ds0A"
      Jwt__Issuer: "TaskManager.API"
      Jwt__Audience: "TaskManager.Client"
      Jwt__ExpirationInMinutes: "60"
      Ollama__BaseUrl: "http://ollama:11434/"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data: